# Skill 来源配置
# mode: exclude — 获取该来源下所有 skill，排除 exclude 列表中的
# mode: include — 只获取 include 列表中指定的 skill

sources:
  - name: anthropics
    repo: anthropics/skills
    branch: main
    path: skills
    mode: exclude


# 常用 skill 精选（从上面的来源中挑选）
# 会在 skills/my/ 下创建符号链接指向实际 skill 目录
favorites:
  - source: anthropics
    skills:
      - algorithmic-art
      - brand-guidelines
      - canvas-design
      - claude-api
      - doc-coauthoring
      - docx
      - frontend-design
      - internal-comms
      - mcp-builder
      - pdf
      - pptx
      - skill-creator
      - slack-gif-creator
      - theme-factory
      - web-artifacts-builder
      - webapp-testing
      - xlsx
